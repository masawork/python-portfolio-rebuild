<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Sakamoto Portfolio{% endblock %}</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0a0a0f;
            --bg2: #12121a;
            --card: #16161f;
            --card-hover: #1c1c28;
            --text: #e4e4e7;
            --text2: #9ca3af;
            --muted: #6b7280;
            --accent: #22d3ee;
            --green: #34d399;
            --purple: #a78bfa;
            --orange: #fb923c;
            --border: #1e1e2a;
            --border2: #2a2a3a;
        }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.7;
        }
        a { color: var(--accent); text-decoration: none; transition: opacity 0.2s; }
        a:hover { opacity: 0.8; }
        .container { max-width: 1100px; margin: 0 auto; padding: 0 2rem; }

        /* Nav */
        nav {
            position: sticky; top: 0; z-index: 100;
            background: rgba(10,10,15,0.9);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
        }
        .nav-inner {
            max-width: 1100px; margin: 0 auto; padding: 0 2rem;
            display: flex; align-items: center; justify-content: space-between;
            height: 56px;
        }
        .nav-logo {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1rem; font-weight: 600;
            color: var(--accent);
        }
        .nav-logo span { color: var(--muted); }
        .nav-links { display: flex; gap: 1.5rem; list-style: none; }
        .nav-links a {
            color: var(--text2); font-size: 0.82rem; font-weight: 500;
            letter-spacing: 0.3px; transition: color 0.2s;
        }
        .nav-links a:hover, .nav-links a.active { color: var(--accent); opacity: 1; }

        /* Main */
        main { padding: 3rem 0 4rem; min-height: calc(100vh - 56px - 60px); }

        /* Cards */
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 1.75rem;
            transition: border-color 0.3s, transform 0.2s;
        }
        .card:hover { border-color: var(--border2); transform: translateY(-2px); }

        /* Buttons */
        .btn {
            display: inline-flex; align-items: center; gap: 0.4rem;
            padding: 0.5rem 1.2rem; border-radius: 6px;
            font-size: 0.82rem; font-weight: 500; border: none; cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary { background: var(--accent); color: var(--bg); }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(34,211,238,0.25); opacity: 1; }
        .btn-outline { border: 1px solid var(--border); color: var(--text2); background: transparent; }
        .btn-outline:hover { border-color: var(--border2); color: var(--text); opacity: 1; }

        /* Tags */
        .tag {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem; padding: 0.2rem 0.55rem;
            border-radius: 999px; border: 1px solid var(--border);
            color: var(--text2); display: inline-block;
        }
        .tag-active { background: var(--accent); color: var(--bg); border-color: var(--accent); }

        /* Input */
        input[type="text"], textarea {
            width: 100%; padding: 0.6rem 0.8rem;
            background: var(--bg2); border: 1px solid var(--border);
            border-radius: 6px; color: var(--text); font-family: inherit;
            font-size: 0.9rem; outline: none; transition: border-color 0.2s;
        }
        input[type="text"]:focus, textarea:focus { border-color: var(--accent); }

        /* Section */
        .section-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem; color: var(--accent);
            letter-spacing: 1.5px; text-transform: uppercase;
            margin-bottom: 0.5rem;
        }
        h1 { font-size: 2rem; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 1rem; }
        h2 { font-size: 1.3rem; font-weight: 600; letter-spacing: -0.3px; }

        /* Grid */
        .grid { display: grid; gap: 1.25rem; }
        .grid-2 { grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); }
        .grid-3 { grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); }

        /* Footer */
        footer {
            text-align: center; padding: 1.5rem; color: var(--muted);
            font-size: 0.75rem; border-top: 1px solid var(--border);
        }

        /* Markdown content */
        .markdown-body { color: var(--text2); line-height: 1.8; }
        .markdown-body h1, .markdown-body h2, .markdown-body h3 { color: var(--text); margin: 1.5rem 0 0.75rem; }
        .markdown-body p { margin-bottom: 1rem; }
        .markdown-body code {
            font-family: 'JetBrains Mono', monospace;
            background: var(--bg2); padding: 0.15rem 0.4rem;
            border-radius: 3px; font-size: 0.85em;
        }
        .markdown-body pre {
            background: var(--bg2); border: 1px solid var(--border);
            border-radius: 6px; padding: 1rem; overflow-x: auto;
            margin: 1rem 0;
        }
        .markdown-body pre code { background: none; padding: 0; }
        .markdown-body ul, .markdown-body ol { margin: 0.5rem 0 1rem 1.5rem; }
        .markdown-body li { margin-bottom: 0.25rem; }
        .markdown-body strong { color: var(--text); }

        /* Mobile */
        @media (max-width: 768px) {
            .nav-links { gap: 0.75rem; }
            .nav-links a { font-size: 0.75rem; }
            .grid-2, .grid-3 { grid-template-columns: 1fr; }
            h1 { font-size: 1.6rem; }
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav>
        <div class="nav-inner">
            <a href="{% url 'home' %}" class="nav-logo">&gt; sakamoto<span>.portfolio</span></a>
            <ul class="nav-links">
                <li><a href="{% url 'home' %}">Home</a></li>
                <li><a href="{% url 'project_list' %}">Projects</a></li>
                <li><a href="{% url 'blog_list' %}">Blog</a></li>
                <li><a href="{% url 'ml_demo' %}">ML Demo</a></li>
                <li><a href="{% url 'contact' %}">Contact</a></li>
                <li><a href="/api/schema/swagger-ui/">API</a></li>
            </ul>
        </div>
    </nav>

    <main>
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </main>

    <footer>
        <div class="container">&copy; 2026 Sakamoto &mdash; Built with Django + DRF + scikit-learn</div>
    </footer>

    {% block extra_js %}{% endblock %}
</body>
</html>
