{% extends 'base.html' %}

{% block title %}Contact — Sakamoto Portfolio{% endblock %}

{% block content %}
<div style="max-width: 600px;">
    <div class="section-label">CONTACT</div>
    <h1>お問い合わせ</h1>
    <p style="color: var(--text2); margin-bottom: 2rem;">
        お仕事のご依頼・ご相談など、お気軽にご連絡ください。
        このフォームは Django REST Framework の POST API に接続しています。
    </p>

    <form method="post" class="card">
        {% csrf_token %}
        <div style="margin-bottom: 1.5rem;">
            <label for="name" style="display: block; margin-bottom: 0.4rem; font-size: 0.85rem; font-weight: 500;">お名前</label>
            <input type="text" id="name" name="name" required placeholder="山田 太郎">
        </div>

        <div style="margin-bottom: 1.5rem;">
            <label for="email" style="display: block; margin-bottom: 0.4rem; font-size: 0.85rem; font-weight: 500;">メールアドレス</label>
            <input type="text" id="email" name="email" required placeholder="example@email.com">
        </div>

        <div style="margin-bottom: 1.5rem;">
            <label for="message" style="display: block; margin-bottom: 0.4rem; font-size: 0.85rem; font-weight: 500;">メッセージ</label>
            <textarea id="message" name="message" required rows="6" placeholder="お問い合わせ内容をご記入ください..." style="resize: vertical;"></textarea>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center;">送信する</button>
    </form>

    <div id="success-msg" style="display: none; margin-top: 1rem; padding: 1rem; background: rgba(52,211,153,0.1); border: 1px solid rgba(52,211,153,0.3); border-radius: 6px; color: var(--green); font-size: 0.9rem;">
        お問い合わせを受け付けました。ありがとうございます。
    </div>

    <p style="margin-top: 1.5rem; font-size: 0.8rem; color: var(--muted);">
        API: <code style="font-family: 'JetBrains Mono', monospace; background: var(--bg2); padding: 0.1rem 0.3rem; border-radius: 3px; font-size: 0.8rem;">POST /api/contact/</code>
    </p>
</div>

<script>
document.querySelector('form').addEventListener('submit', async function(e) {
    e.preventDefault();
    const formData = new FormData(this);
    const data = {
        name: formData.get('name'),
        email: formData.get('email'),
        message: formData.get('message')
    };
    try {
        const response = await fetch('/api/contact/', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value
            },
            body: JSON.stringify(data)
        });
        if (response.ok) {
            this.reset();
            document.getElementById('success-msg').style.display = 'block';
            setTimeout(() => { document.getElementById('success-msg').style.display = 'none'; }, 5000);
        } else {
            const result = await response.json();
            alert('エラー: ' + (result.error || '送信に失敗しました'));
        }
    } catch (error) {
        alert('エラー: ' + error.message);
    }
});
</script>
{% endblock %}
